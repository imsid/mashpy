kind: source
version: 1
id: ad_performance
dataset: marketing_db
table: campaign_ads
grain:
  - campaign_ad_id
dimensions:
  - name: campaign_ad_id
    expr: campaign_ad_id
    data_type: INT64
    is_primary_key: true
  - name: campaign_id
    expr: campaign_id
    data_type: INT64
  - name: creative_id
    expr: creative_id
    data_type: INT64
  - name: channel_id
    expr: channel_id
    data_type: INT64
  - name: status
    expr: status
    data_type: STRING
  - name: start_date
    expr: start_date
    data_type: DATE
  - name: end_date
    expr: end_date
    data_type: DATE
measures:
  - name: impression_count
    expr: impressions
    agg: SUM
    data_type: INT64
  - name: click_count
    expr: clicks
    agg: SUM
    data_type: INT64
  - name: conversion_count
    expr: conversions
    agg: SUM
    data_type: INT64
  - name: revenue_total
    expr: revenue
    agg: SUM
    data_type: NUMERIC
  - name: spend_total
    expr: spent_amount
    agg: SUM
    data_type: NUMERIC
  - name: budget_allocation
    expr: budget_allocation
    agg: SUM
    data_type: NUMERIC
  - name: spend_avg
    expr: spent_amount
    agg: AVG
    data_type: NUMERIC
  - name: ad_count
    expr: campaign_ad_id
    agg: COUNT_DISTINCT
    data_type: INT64
  - name: row_count
    expr: "1"
    agg: COUNT
    data_type: INT64

[project]
name = "mash-telemetry-web"
version = "0.1.1"
description = "Optional observer UI assets for mash telemetry"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [{ name = "imsid" }]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["mash_telemetry_web*"]

[tool.setuptools.package-data]
mash_telemetry_web = ["static/**/*"]

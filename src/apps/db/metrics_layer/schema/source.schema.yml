type: object
description: Schema for a metrics_layer source config file.
required:
  - kind
  - version
  - id
  - dataset
  - table
  - grain
  - dimensions
  - measures
properties:
  kind:
    type: string
    description: Discriminator for source config documents.
    enum: [source]
  version:
    type: integer
    description: Schema version for this source definition.
  id:
    type: string
    description: Stable source identifier, typically matching the filename stem.
  dataset:
    type: string
    description: Logical dataset id under metrics_layer.
  table:
    type: string
    description: Physical BigQuery table name backing this source.
  grain:
    type: array
    description: Columns or expressions that uniquely identify a row.
    items:
      type: string
      description: A grain key column or expression.
  dimensions:
    type: array
    description: Non-aggregated fields available for filtering and grouping.
    items:
      type: object
      description: Dimension field definition.
      required:
        - name
        - expr
        - data_type
      properties:
        name:
          type: string
          description: Stable dimension id used by metrics and queries.
        expr:
          type: string
          description: SQL expression for the dimension value.
        data_type:
          type: string
          description: Data type of the dimension output (for example INT64, STRING).
        is_primary_key:
          type: boolean
          description: Marks whether this dimension participates in the primary key.
  measures:
    type: array
    description: Aggregated fields available as building blocks for metrics.
    items:
      type: object
      description: Measure field definition.
      required:
        - name
        - expr
        - agg
        - data_type
      properties:
        name:
          type: string
          description: Stable measure id.
        expr:
          type: string
          description: SQL expression for the measure input.
        agg:
          type: string
          description: Aggregation function applied to expr (for example SUM, COUNT).
        data_type:
          type: string
          description: Data type of the aggregated result.
  joins:
    type: array
    description: Optional join relationships from this source to other sources.
    items:
      type: object
      description: Join relationship definition.
      required:
        - to_source
        - join_type
        - left_key
        - right_key
        - relationship
      properties:
        to_source:
          type: string
          description: Target source id to join to.
        join_type:
          type: string
          description: SQL join type (for example LEFT, INNER).
        left_key:
          type: string
          description: Join key expression on this source.
        right_key:
          type: string
          description: Join key expression on the target source.
        relationship:
          type: string
          description: Cardinality relationship (for example many_to_one).

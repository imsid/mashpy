kind: source
version: 1
id: customers
dataset: marketing_db
table: customers
grain:
  - customer_id
dimensions:
  - name: customer_id
    expr: customer_id
    data_type: INT64
    is_primary_key: true
  - name: customer_segment
    expr: segment
    data_type: STRING
  - name: acquisition_source
    expr: acquisition_source
    data_type: STRING
  - name: gender
    expr: gender
    data_type: STRING
  - name: country
    expr: country
    data_type: STRING
  - name: acquisition_date
    expr: acquisition_date
    data_type: DATE
  - name: acquisition_month
    expr: DATE_TRUNC(acquisition_date, MONTH)
    data_type: DATE
measures:
  - name: customer_count
    expr: customer_id
    agg: COUNT_DISTINCT
    data_type: INT64
  - name: lifetime_value_total
    expr: lifetime_value
    agg: SUM
    data_type: NUMERIC
  - name: lifetime_value_avg
    expr: lifetime_value
    agg: AVG
    data_type: NUMERIC
  - name: row_count
    expr: "1"
    agg: COUNT
    data_type: INT64

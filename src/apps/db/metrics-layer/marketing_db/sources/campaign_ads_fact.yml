kind: source
version: 1
id: campaign_ads_fact
dataset: marketing_db
table: campaign_ads
grain:
  - campaign_ad_id
dimensions:
  - name: campaign_ad_id
    expr: campaign_ad_id
    data_type: INT64
    is_primary_key: true
  - name: campaign_id
    expr: campaign_id
    data_type: INT64
  - name: creative_id
    expr: creative_id
    data_type: INT64
  - name: channel_id
    expr: channel_id
    data_type: INT64
  - name: start_date
    expr: start_date
    data_type: DATE
  - name: end_date
    expr: end_date
    data_type: DATE
  - name: status
    expr: status
    data_type: STRING
measures:
  - name: impressions
    expr: impressions
    agg: SUM
    data_type: INT64
  - name: clicks
    expr: clicks
    agg: SUM
    data_type: INT64
  - name: conversions
    expr: conversions
    agg: SUM
    data_type: INT64
  - name: spent_amount
    expr: spent_amount
    agg: SUM
    data_type: FLOAT64
  - name: revenue
    expr: revenue
    agg: SUM
    data_type: FLOAT64
joins:
  - to_source: campaign
    join_type: LEFT
    left_key: campaign_id
    right_key: campaign_id
    relationship: many_to_one
  - to_source: channel
    join_type: LEFT
    left_key: channel_id
    right_key: channel_id
    relationship: many_to_one
  - to_source: creative
    join_type: LEFT
    left_key: creative_id
    right_key: creative_id
    relationship: many_to_one

name: PR title

# Enforces a Conventional Commits style PR title. Because PRs are squash-merged
# with the PR title as the commit subject, this keeps main's history machine-
# readable for release-please.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  lint:
    name: PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types. Keep in sync with release-please-config.json sections.
          types: |
            feat
            fix
            perf
            deps
            docs
            refactor
            revert
            test
            build
            ci
            chore
            style
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The subject "{subject}" must start with a lowercase letter.

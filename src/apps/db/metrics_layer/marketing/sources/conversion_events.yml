kind: source
version: 1
id: conversion_events
dataset: marketing_db
table: conversion_events
grain:
  - conversion_id
dimensions:
  - name: conversion_id
    expr: conversion_id
    data_type: INT64
    is_primary_key: true
  - name: campaign_ad_id
    expr: campaign_ad_id
    data_type: INT64
  - name: customer_id
    expr: customer_id
    data_type: INT64
  - name: conversion_type
    expr: conversion_type
    data_type: STRING
  - name: created_at
    expr: created_at
    data_type: TIMESTAMP
measures:
  - name: conversion_count
    expr: conversion_id
    agg: COUNT_DISTINCT
    data_type: INT64
  - name: conversion_value_total
    expr: value
    agg: SUM
    data_type: NUMERIC
  - name: revenue_total
    expr: value
    agg: SUM
    data_type: NUMERIC
  - name: conversion_value_avg
    expr: value
    agg: AVG
    data_type: NUMERIC
  - name: row_count
    expr: "1"
    agg: COUNT
    data_type: INT64

[project]
name = "mashpy"
version = "0.1.2"
description = "Platform for building interactive agentic applications."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Proprietary"}
authors = [{ name = "imsid" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "License :: Other/Proprietary License",
  "Operating System :: OS Independent",
]
keywords = ["agents", "cli", "mcp", "llm"]

dependencies = [
  "anthropic>=0.39.0",
  "mcp>=0.1.0",
  "openai>=1.57.4",
  "PyYAML>=6.0.2",
  "requests>=2.31.0",
  "tomli>=2.0.1; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/imsid/mashpy"
Documentation = "https://github.com/imsid/mashpy#readme"
Repository = "https://github.com/imsid/mashpy"

[project.optional-dependencies]
dev = [
  "build>=1.2.2",
  "pytest>=8.3.0",
  "twine>=6.1.0",
]
cli = [
  "mash-cli>=0.1.0",
]
telemetry-web = [
  "mash-telemetry-web>=0.1.0",
]
api = [
  "mash-api>=0.1.0",
]

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["mash*"]
exclude = ["apps*"]

[tool.uv.sources]
mash-cli = { path = "packages/mash-cli" }
mash-telemetry-web = { path = "packages/mash-telemetry-web" }
mash-api = { path = "packages/mash-api" }

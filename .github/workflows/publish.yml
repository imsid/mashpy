name: Publish PyPI

on:
  release:
    # `released` covers promoting a prerelease to a stable release.
    # `published` covers direct stable releases and some draft->published flows.
    types: [published, released]

concurrency:
  group: pypi-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    if: ${{ github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.resolve_target.outputs.should_publish }}
      package_dir: ${{ steps.resolve_target.outputs.package_dir }}
      artifact_name: ${{ steps.resolve_target.outputs.artifact_name }}
      package_version: ${{ steps.resolve_target.outputs.package_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Resolve package target from release tag
        id: resolve_target
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          import tomllib

          release_tag = os.environ["RELEASE_TAG"]

          match = re.match(r"^(?:mashpy-)?v(?P<version>.+)$", release_tag)
          if match is None:
              raise SystemExit(
                  f"Unsupported release tag {release_tag!r}. Expected 'v<version>' or 'mashpy-v<version>'."
              )

          version_from_tag = match.group("version")
          pyproject_path = Path("pyproject.toml")
          data = tomllib.loads(pyproject_path.read_text(encoding="utf-8"))
          pyproject_version = data["project"]["version"]

          if version_from_tag != pyproject_version:
              raise SystemExit(
                  "Release tag mismatch: "
                  f"tag version {version_from_tag!r} does not match "
                  f"{pyproject_path} project.version {pyproject_version!r}"
              )

          print(f"Resolved mashpy from tag {release_tag} (version {pyproject_version})")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          output_path.write_text(
              "\n".join(
                  [
                      "should_publish=true",
                      "package_dir=.",
                      "artifact_name=pypi-dist-mashpy",
                      f"package_version={pyproject_version}",
                  ]
              )
              + "\n",
              encoding="utf-8",
          )
          PY

      - name: Build artifacts
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        run: |
          cd "${{ steps.resolve_target.outputs.package_dir }}"
          uv build

      - name: Check package metadata
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        run: |
          uvx twine check "${{ steps.resolve_target.outputs.package_dir }}/dist/*"

      - name: Upload dist artifacts
        if: ${{ steps.resolve_target.outputs.should_publish == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.resolve_target.outputs.artifact_name }}
          path: ${{ steps.resolve_target.outputs.package_dir }}/dist/*

  publish:
    if: ${{ github.event.release.prerelease == false && needs.build.outputs.should_publish == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact_name }}
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Avoid hard failures if GitHub emits both `published` and `released`
          # for the same tag and the second run reaches this step.
          skip-existing: true

kind: source
version: 1
id: website_visits
dataset: marketing_db
table: website_visits
grain:
  - visit_id
dimensions:
  - name: visit_id
    expr: visit_id
    data_type: INT64
    is_primary_key: true
  - name: campaign_ad_id
    expr: campaign_ad_id
    data_type: INT64
  - name: customer_id
    expr: customer_id
    data_type: INT64
  - name: device_type
    expr: device_type
    data_type: STRING
  - name: utm_source
    expr: utm_source
    data_type: STRING
  - name: utm_medium
    expr: utm_medium
    data_type: STRING
  - name: utm_campaign
    expr: utm_campaign
    data_type: STRING
  - name: country
    expr: country
    data_type: STRING
  - name: city
    expr: city
    data_type: STRING
  - name: visited_at
    expr: visited_at
    data_type: TIMESTAMP
measures:
  - name: visit_count
    expr: visit_id
    agg: COUNT_DISTINCT
    data_type: INT64
  - name: pages_per_visit_avg
    expr: pages_viewed
    agg: AVG
    data_type: NUMERIC
  - name: session_duration_total
    expr: duration_seconds
    agg: SUM
    data_type: INT64
  - name: session_duration_avg
    expr: duration_seconds
    agg: AVG
    data_type: NUMERIC
  - name: row_count
    expr: "1"
    agg: COUNT
    data_type: INT64

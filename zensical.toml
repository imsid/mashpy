# Zensical configuration for the Mash documentation/blog site.
# Docs: https://zensical.org/docs/setup/basics/
[project]
site_name = "Mash"
site_description = "Mash — a self-hosted runtime and SDK for building multi-agent applications."
site_author = "imsid"
site_url = "https://imsid.github.io/mashpy/"
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/imsid/mashpy"
repo_name = "imsid/mashpy"
copyright = "Copyright &copy; 2026 The Mash authors"
nav = [
    { "Home" = "index.md" },
    { "Posts" = [
        { "Start Here" = [
            { "General Concepts" = "posts/concepts.md" },
            { "Mash Product Brief" = "posts/product-brief.md" },
            { "Mash Under the Hood" = "posts/mash-under-the-hood.md" },
            { "Host-to-Agent Protocol (H2A)" = "rfcs/host-to-agent-protocol.md" },
            { "Case Study: Moma" = "posts/case-study-moma.html" },
            { "Case Study: Pilot" = "posts/case-study-pilot.html" },
        ] },
        { "Internals" = [
            { "The Life of a Mash Request" = "posts/request-lifecycle.md" },
            { "Durable Agent Loop" = "posts/durable-agent-loop.md" },
            { "Persistence Store" = "posts/persistence-store.md" },
            { "Host API and CLI" = "posts/host-api-and-cli.md" },
            { "Human-in-the-Loop" = "posts/human-in-the-loop.md" },
            { "Remote Tools over MCP" = "posts/remote-tools-mcp.md" },
            { "One LLM Contract" = "posts/one-llm-contract.md" },
            { "Open-Source Models" = "posts/oss-models.md" },
            { "Skills: Instructions on Demand" = "posts/skills-on-demand.md" },
            { "Memory and Compaction" = "posts/memory-and-compaction.md" },
            { "Composing Agents" = "posts/composing-agents.md" },
            { "Workflows" = "posts/workflows-as-step-pipelines.md" },
            { "Reading a Trace" = "posts/reading-a-trace.md" },
            { "Synthetic Evals" = "posts/synthetic-evals.md" },
        ] },
        { "Guides" = [
            { "Exploring Mash with Pilot" = "posts/exploring-mash-with-pilot.md" },
            { "Building an Agent CLI" = "posts/building-agent-clis.md" },
            { "Building Dynamic Hosts over the API" = "posts/building-dynamic-hosts-apis.md" },
            { "How to Deploy a Mash Host" = "posts/how-to-deploy.md" },
            { "Releasing Mash" = "posts/releasing.md" },
        ] },
        { "Learnings" = [
            { "Prompt Caching and the Token Meter" = "posts/prompt-caching-token-meter.md" },
        ] },
    ] },
]

[project.theme]
language = "en"
features = [
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "toc.follow",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/imsid/mashpy"

# Markdown extensions (mirrors the Zensical default template).
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]

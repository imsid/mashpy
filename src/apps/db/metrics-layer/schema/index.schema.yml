type: object
required:
  - kind
  - version
  - dataset
  - generated_at
  - sources
  - metrics
properties:
  kind:
    type: string
    enum: [metrics_index]
  version:
    type: integer
  dataset:
    type: string
  generated_at:
    type: string
  sources:
    type: array
    items:
      type: object
      required:
        - id
        - file
        - table
      properties:
        id:
          type: string
        file:
          type: string
        table:
          type: string
  metrics:
    type: array
    items:
      type: object
      required:
        - id
        - file
        - type
      properties:
        id:
          type: string
        file:
          type: string
        type:
          type: string
